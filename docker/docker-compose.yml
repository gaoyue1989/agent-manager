version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8911:8911"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - agent-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api/v1
    depends_on:
      - backend
    networks:
      - agent-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - SERVER_PORT=8080
      - MYSQL_DSN=agent_manager:Agent@Manager2026@tcp(mysql:3306)/agent_manager?charset=utf8mb4&parseTime=True&loc=Local
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=agent-manager
      - INGRESS_HOST=localhost
      - INGRESS_ENABLED=false
      - CODEGEN_PYTHON=/opt/codegen-venv/bin/python3
      - CODEGEN_SCRIPT=/opt/codegen/generator.py
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - agent-net

  mysql:
    image: greatsql/greatsql:8.0.32-25
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=agent_manager
      - MYSQL_USER=agent_manager
      - MYSQL_PASSWORD=Agent@Manager2026
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "agent_manager", "-pAgent@Manager2026"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - agent-net

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - agent-net

volumes:
  mysql_data:
  minio_data:

networks:
  agent-net:
    driver: bridge
