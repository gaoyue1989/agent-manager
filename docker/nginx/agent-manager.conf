# Agent Manager — Dev 本地 Nginx 反向代理 (8911)
# 用法: sudo ln -s $(pwd)/docker/nginx/agent-manager.conf /etc/nginx/conf.d/agent-manager.conf
#       sudo nginx -t && sudo nginx -s reload

server {
    listen 8911;

    client_max_body_size 100M;

    # 前端 (Next.js dev server 127.0.0.1:3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 后端 API (Go dev server 127.0.0.1:8080)
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Agent Ingress 请求转发到 K8s Ingress Controller NodePort (30080)
    location /agent/ {
        proxy_pass http://127.0.0.1:30080;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }
}
